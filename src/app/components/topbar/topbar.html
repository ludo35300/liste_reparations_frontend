<!-- Niveau 1 : se cache au scroll -->
<div class="topbar-top" [class.hidden]="topbarHidden()">

  <!-- Gauche : Brand -->
  <div class="topbar-brand">
    <div class="brand-icon"><i class="fas fa-wrench"></i></div>
    <span class="brand-name">Réparations</span>
  </div>

  <!-- Centre : Outils -->
  <div class="topbar-tools">
    <button class="tool-btn" title="Recherche" aria-label="Recherche">
      <i class="fas fa-search"></i>
    </button>
    <button class="tool-btn" title="Plein écran" (click)="toggleFullscreen()">
      <i class="fas fa-expand"></i>
    </button>
    <button class="tool-btn" title="Notifications">
      <i class="fas fa-bell"></i>
    </button>
    @if (pageTitle()) {
      <span class="topbar-page-title d-none d-md-inline">{{ pageTitle() }}</span>
    }
  </div>

  <!-- Droite : Profil -->
  <div class="topbar-right">
    @if (me()) {
      <div class="user-menu" [class.open]="menuOpen()">
        <button class="user-chip" (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()" aria-haspopup="true">
          <div class="avatar">{{ initials() }}</div>
          <div class="user-info d-none d-sm-flex">
            <span class="user-name">{{ me()!.firstName }} {{ me()!.lastName }}</span>
            <span class="user-email">{{ me()!.email }}</span>
          </div>
          <i class="fas fa-chevron-down chevron"></i>
        </button>

        @if (menuOpen()) {
          <div class="dropdown-menu-custom" role="menu">
            <div class="dropdown-header">
              <div class="avatar avatar-lg">{{ initials() }}</div>
              <div>
                <p class="dropdown-name">{{ me()!.firstName }} {{ me()!.lastName }}</p>
                <p class="dropdown-email">{{ me()!.email }}</p>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item-custom disabled" disabled role="menuitem">
              <i class="fas fa-user"></i>
              <span>Mon profil</span>
              <span class="badge-soon">Bientôt</span>
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item-custom danger" (click)="onLogout()" role="menuitem">
              <i class="fas fa-sign-out-alt"></i>
              <span>Déconnexion</span>
            </button>
          </div>
        }
      </div>
    }
  </div>
</div>

<!-- Niveau 2 : navbar toujours visible -->
<nav class="topbar-nav" [class.scrolled]="topbarHidden()" aria-label="Navigation">

  <!-- Hamburger mobile -->
  <button class="nav-hamburger d-md-none"
    (click)="mobileNavOpen.set(!mobileNavOpen())" aria-label="Menu">
    <i class="fas" [class.fa-bars]="!mobileNavOpen()" [class.fa-times]="mobileNavOpen()"></i>
  </button>

  <!-- Liens desktop -->
  <div class="nav-links" [class.mobile-open]="mobileNavOpen()">
    @for (item of navItems(); track item.route) {
      <a [routerLink]="item.route"
         routerLinkActive="nav-active"
         [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
         class="nav-link-item"
         (click)="mobileNavOpen.set(false)">
        <fa-icon [icon]="item.icon" class="nav-icon"></fa-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Breadcrumb droite -->
  @if (pageTitle()) {
    <div class="nav-breadcrumb d-none d-lg-flex">
      <i class="fas fa-home"></i>
      <i class="fas fa-chevron-right breadcrumb-sep"></i>
      <span class="breadcrumb-current">{{ pageTitle() }}</span>
    </div>
  }
</nav>
