<!-- Niveau 1 : se cache au scroll -->
<div class="topbar-top" [class.hidden]="topbarHidden()">

  <!-- Gauche : Outils rapides -->
  <div class="topbar-tools">
    <button class="tool-btn" title="Recherche" aria-label="Recherche">
      <fa-icon [icon]="faMagnifyingGlass"></fa-icon>
    </button>
    <button class="tool-btn" title="Plein écran" aria-label="Plein écran" (click)="toggleFullscreen()">
      <fa-icon [icon]="faExpand"></fa-icon>
    </button>
    <button class="tool-btn" title="Notifications" aria-label="Notifications">
      <fa-icon [icon]="faBell"></fa-icon>
    </button>
  </div>

  <!-- Centre : Brand -->
  <div class="topbar-brand">
    <div class="brand-icon">
      <img src="/favicon.svg" alt="Logo réparations" width="28" height="28">
    </div>
    <span class="brand-name">Mes Réparations</span>
  </div>

  <!-- Droite : Profil -->
  <div class="topbar-right">
    @if (me()) {
      <div class="user-menu" [class.open]="menuOpen()">
        <button
          class="user-chip"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-haspopup="true"
          [attr.aria-label]="'Menu de ' + me()!.firstName">
          <div class="avatar">{{ initials() }}</div>
          <div class="user-info d-none d-sm-flex">
            <span class="user-name">{{ me()!.firstName }} {{ me()!.lastName }}</span>
            <span class="user-email">{{ me()!.email }}</span>
          </div>
          <i class="fas fa-chevron-down chevron" aria-hidden="true"></i>
        </button>

        @if (menuOpen()) {
          <div class="dropdown-menu-custom" role="menu">
            <div class="dropdown-header">
              <div class="avatar avatar-lg">{{ initials() }}</div>
              <div>
                <p class="dropdown-name">{{ me()!.firstName }} {{ me()!.lastName }}</p>
                <p class="dropdown-email">{{ me()!.email }}</p>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item-custom disabled" disabled role="menuitem">
              <i class="fas fa-user" aria-hidden="true"></i>
              <span>Mon profil</span>
              <span class="badge-soon">Bientôt</span>
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item-custom danger" (click)="onLogout()" role="menuitem">
              <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
              <span>Déconnexion</span>
            </button>
          </div>
        }
      </div>
    }
  </div>
</div>

<!-- Niveau 2 : navbar toujours visible -->
<nav class="topbar-nav" [class.scrolled]="topbarHidden()" aria-label="Navigation principale">

  <!-- Hamburger mobile -->
  <button
    class="nav-hamburger d-md-none"
    (click)="mobileNavOpen.set(!mobileNavOpen())"
    aria-label="Menu">
    <fa-icon [icon]="faBars" [class.fa-bars]="!mobileNavOpen()" [class.fa-times]="mobileNavOpen()" aria-hidden="true"></fa-icon>
  </button>

  <!-- Liens desktop -->
  <div class="nav-links" [class.mobile-open]="mobileNavOpen()">
    @for (item of navItems(); track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
        class="nav-link-item"
        [attr.aria-label]="item.label"
        (click)="mobileNavOpen.set(false)">
        <fa-icon [icon]="item.icon" class="nav-icon" aria-hidden="true"></fa-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </div>

  <!-- Breadcrumb droite -->
  @if (pageTitle()) {
    <div class="nav-breadcrumb d-none d-lg-flex">
      <i class="fas fa-home" aria-hidden="true"></i>
      <i class="fas fa-chevron-right breadcrumb-sep" aria-hidden="true"></i>
      <span class="breadcrumb-current">{{ pageTitle() }}</span>
    </div>
  }
</nav>
