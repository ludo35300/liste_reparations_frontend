<header class="topbar">
  <div class="topbar-left">
    @if (pageTitle()) {
      <h1 class="page-title">{{ pageTitle() }}</h1>
    }
  </div>

  <div class="topbar-right">
    @if (me()) {
      <div class="user-menu" [class.open]="menuOpen()" (clickOutside)="menuOpen.set(false)">

        <!-- Bouton déclencheur -->
        <button
          class="user-chip"
          (click)="toggleMenu()"
          [attr.aria-expanded]="menuOpen()"
          aria-haspopup="true"
          [attr.aria-label]="'Menu de ' + me()!.firstName">
          
          <div class="avatar" [attr.aria-label]="'Compte de ' + me()!.firstName">
            {{ initials() }}
          </div>
          <svg class="chevron" viewBox="0 0 20 20" fill="currentColor"
               width="14" height="14" aria-hidden="true">
            <path fill-rule="evenodd"
              d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
              clip-rule="evenodd"/>
          </svg>
        </button>

        <!-- Dropdown -->
        @if (menuOpen()) {
          <div class="dropdown" role="menu">
            <div class="dropdown-header">
              <div class="avatar avatar-lg">{{ initials() }}</div>
              <div>
                <p class="dropdown-name">{{ me()!.firstName }} {{ me()!.lastName }}</p>
                <p class="dropdown-email">{{ me()!.email }}</p>
              </div>
            </div>

            <div class="dropdown-divider"></div>

            <!-- Profil (désactivé pour l'instant) -->
            <button class="dropdown-item disabled" disabled role="menuitem">
              <fa-icon [icon]="faUser" />
              <span>Mon profil</span>
              <span class="dropdown-soon">Bientôt</span>
            </button>

            <div class="dropdown-divider"></div>

            <!-- Déconnexion -->
            <button class="dropdown-item danger" (click)="onLogout()" role="menuitem">
              <fa-icon [icon]="faDoorOpen" />
              <span>Déconnexion</span>
            </button>
          </div>
        }

      </div>
    }
  </div>
</header>
