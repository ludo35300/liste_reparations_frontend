<div class="layout">

 

  <div class="layout-right">

    <app-topbar
      [me]="me()"
      pageTitle="Tableau de bord"
      [navItems]="navItems"
      (logoutEvt)="logout()"
    />

    <main class="main-content">

      @if (loading()) {
        <div class="state-loading" role="status" aria-live="polite">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <span>Chargement...</span>
        </div>
      }

      @if (errorMessage()) {
        <div class="alert alert-danger" role="alert">{{ errorMessage() }}</div>
      }

      @if (me()) {

        <!-- Greeting -->
        <div class="greeting">
          <div>
            <h2 class="greeting-title">Bonjour, {{ me()!.firstName }} 👋</h2>
          </div>
        </div>

        <!-- KPI Row 
        <div class="kpi-row">
          @for (kpi of kpiCards; track kpi.label) {
            <div class="kpi-card" [style.--kpi-color]="kpi.color">
              <div class="kpi-icon">{{ kpi.icon }}</div>
              <div class="kpi-body">
                <span class="kpi-value">{{ kpi.value }}</span>
                <span class="kpi-label">{{ kpi.label }}</span>
              </div>
              <span class="kpi-trend" [class.up]="kpi.trendUp" [class.down]="!kpi.trendUp">
                {{ kpi.trendUp ? '▲' : '▼' }} {{ kpi.trend }}
              </span>
            </div>
          }
        </div>-->

        <!-- Action Cards -->
        <h3 class="section-title">Actions rapides</h3>
        <div class="cards-grid">
          @for (card of dashCards; track card.route) {
            <div class="dash-card" [routerLink]="card.route"
                 role="button" tabindex="0" [attr.aria-label]="card.title"
                 [style.--card-color]="card.color">
              <div class="card-icon-wrap">{{ card.icon }}</div>
              <div class="card-body">
                <h3>{{ card.title }}</h3>
                <p>{{ card.desc }}</p>
              </div>
              <span class="card-arrow" aria-hidden="true">→</span>
            </div>
          }
        </div>

      }

    </main>
  </div>
</div>
