<div class="layout">
  <div class="layout-right">

    <app-topbar
      [me]="me()"
      pageTitle="Tableau de bord"
      [navItems]="navItems"
      (logoutEvt)="logout()"
    />

    <main class="main-content">

      @if (loading()) {
        <div class="state-loading" role="status" aria-live="polite">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <span>Chargement...</span>
        </div>
      }

      @if (errorMessage()) {
        <div class="alert alert-danger" role="alert">{{ errorMessage() }}</div>
      }

      @if (me()) {

        <!-- Greeting -->
        <div class="greeting">
          <div>
            <h2 class="greeting-title">Bonjour, {{ me()!.firstName }} 👋</h2>
          </div>
        </div>

        

        <!-- Action Cards -->
        <h3 class="section-title">Actions rapides</h3>
        <div class="cards-grid">
          @for (card of dashCards; track card.route) {
            <div class="dash-card" [routerLink]="card.route"
                role="button" tabindex="0"
                [attr.aria-label]="card.title"
                [style.--card-color]="card.color">

              <!-- Image / Illustration en haut -->
              <div class="card-img-top" [style.background]="card.color + '18'">
                <span class="card-big-icon">{{ card.icon }}</span>
              </div>

              <!-- Corps -->
              <div class="card-content">
                <h3 class="card-title">{{ card.title }}</h3>
                <p class="card-desc">{{ card.desc }}</p>
              </div>
            </div>
          }
        </div>

      }

    </main>
  </div>
</div>
